services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-embodied_ai}
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend-api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "18000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://root:root123@mysql:3306/embodied_ai}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend-worker:
    build: ./backend
    command: python -m app.worker.main
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://root:root123@mysql:3306/embodied_ai}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    healthcheck:
      test: ["CMD", "python", "-c", "from app.worker.executor import WorkerExecutor; from app.infrastructure.redis.queue import TaskQueue; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "18081:80"
    depends_on:
      - backend-api
    restart: unless-stopped

volumes:
  mysql_data:
